<div class="app">
  <header class="header">
    <h1 class="logo">✓ Lumi Todo</h1>
    <span class="header-count" id="task-count">0 tasks</span>
  </header>

  <main class="main">
    <div class="input-row">
      <input class="todo-input" id="todo-input" type="text" placeholder="What needs to be done?" />
      <button class="btn btn-add" id="btn-add">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" id="filter-all">All</button>
      <button class="filter-btn" id="filter-active">Active</button>
      <button class="filter-btn" id="filter-done">Done</button>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <div class="footer-bar" id="footer-bar">
      <span class="remaining" id="remaining-text">0 items left</span>
      <button class="btn btn-clear" id="btn-clear">Clear Completed</button>
    </div>
  </main>

  <footer class="app-footer">
    <span class="footer-text">Built with Lumi — HTML/CSS/C# Desktop Framework</span>
  </footer>
</div>
