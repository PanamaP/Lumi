<div class="app">
  <header class="header">
    <h1 class="logo">📝 Form Demo</h1>
    <span class="header-sub">All Lumi Components</span>
  </header>

  <main class="main">
    <div class="form-container">
      <h2 class="form-title">Create Account</h2>
      <p class="form-subtitle">Complete the form below to register. All fields are demonstrated.</p>

      <!-- Text inputs section -->
      <div class="section">
        <h3 class="section-title">Personal Information</h3>
        <div class="field-row">
          <div class="field" id="field-firstname"></div>
          <div class="field" id="field-lastname"></div>
        </div>
        <div class="field" id="field-email"></div>
        <div class="field" id="field-password"></div>
      </div>

      <!-- Selection section -->
      <div class="section">
        <h3 class="section-title">Preferences</h3>
        <div class="field" id="field-country"></div>
        <div class="field" id="field-role"></div>
        <div class="field" id="field-experience"></div>
      </div>

      <!-- Toggles & checkboxes -->
      <div class="section">
        <h3 class="section-title">Settings</h3>
        <div class="toggles" id="toggles-host"></div>
      </div>

      <!-- Validation messages -->
      <div class="validation-area" id="validation-area"></div>

      <!-- Action buttons -->
      <div class="actions" id="actions-host"></div>
    </div>
  </main>

  <footer class="app-footer">
    <span class="footer-text">Built with Lumi — HTML/CSS/C# Desktop Framework</span>
  </footer>
</div>
