name: Mutation testing
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore tools
        run: dotnet tool restore
      - name: Restore solution
        run: dotnet restore Lumi.slnx
      - name: Build
        run: dotnet build Lumi.slnx -c Release --no-restore
      - name: Run Stryker
        run: dotnet stryker
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: StrykerOutput/**/reports/mutation-report.html
