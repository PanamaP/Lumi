name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lumi.slnx

      - name: Build
        run: dotnet build Lumi.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/Lumi.Tests/Lumi.Tests.csproj --no-build -c Release
