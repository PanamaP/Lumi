name: Publish to NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lumi.slnx

      - name: Build
        run: dotnet build Lumi.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/Lumi.Tests/Lumi.Tests.csproj --no-build -c Release

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack Lumi
        run: dotnet pack src/Lumi/Lumi.csproj -c Release -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Sync template Lumi version
        run: sed -i 's|<PackageReference Include="Lumi" Version="[^"]*"|<PackageReference Include="Lumi" Version="${{ steps.version.outputs.VERSION }}"|' templates/lumi-app/LumiApp.1.csproj

      - name: Pack Lumi.Templates
        run: dotnet pack templates/Lumi.Templates.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lumi ${{ steps.version.outputs.VERSION }}
          generate_release_notes: false
          body_path: CHANGELOG.md
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'preview') }}
          files: ./nupkgs/*.nupkg
